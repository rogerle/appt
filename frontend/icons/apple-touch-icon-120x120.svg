<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="grad-120" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0071e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="120" height="120" rx="20" fill="url(#grad-120)"/>
  
  <!-- Lotus flower petals (Apple Blue on gradient) -->
  <g fill="white">
    <ellipse cx="60.0" cy="42.0" rx="24.0" ry="36.0"/>
    <ellipse cx="78.0" cy="60.0" rx="24.0" ry="36.0" transform="rotate(90 78.0 60.0)"/>
    <ellipse cx="60.0" cy="78.0" rx="24.0" ry="36.0" transform="rotate(180 60.0 78.0)"/>
    <ellipse cx="42.0" cy="60.0" rx="24.0" ry="36.0" transform="rotate(-90 42.0 60.0)"/>
  </g>
</svg>
