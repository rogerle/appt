<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="grad-40" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0071e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="40" height="40" rx="8" fill="url(#grad-40)"/>
  
  <!-- Lotus flower petals (Apple Blue on gradient) -->
  <g fill="white">
    <ellipse cx="20.0" cy="14.0" rx="8.0" ry="12.0"/>
    <ellipse cx="26.0" cy="20.0" rx="8.0" ry="12.0" transform="rotate(90 26.0 20.0)"/>
    <ellipse cx="20.0" cy="26.0" rx="8.0" ry="12.0" transform="rotate(180 20.0 26.0)"/>
    <ellipse cx="14.0" cy="20.0" rx="8.0" ry="12.0" transform="rotate(-90 14.0 20.0)"/>
  </g>
</svg>
