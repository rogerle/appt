<!doctype html>
<html lang="zh-CN">
  <head>
    <!-- Apple HIG Meta Tags -->
    <meta charset="UTF-8" />
    
    <!-- Viewport (Apple Recommended: allow zoom for accessibility) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    
    <!-- Apple PWA Configuration -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Appt" />
    
    <!-- Theme Colors (Apple Blue #0071e3 per design system) -->
    <meta name="theme-color" content="#0071e3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0071e3" media="(prefers-color-scheme: dark)" />
    
    <!-- Apple Touch Icons - Multiple Sizes for All iOS Devices -->
    <!-- iPhone (Retina): 180x180 -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180x180.svg" />
    <!-- iPad Pro: 167x167 -->
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/apple-touch-icon-167x167.svg" />
    <!-- iPad (Non-Pro): 152x152 -->
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152x152.svg" />
    <!-- Legacy/Other: 120x120, 76x76, 40x40 -->
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/apple-touch-icon-120x120.svg" />
    <link rel="apple-touch-icon" sizes="76x76" href="/icons/apple-touch-icon-76x76.svg" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Favicon (SVG for modern browsers) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <title>Appt - Yoga Studio Scheduler</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
