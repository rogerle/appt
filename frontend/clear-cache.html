<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>🚀 强制清除缓存 - Appt</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { 
            color: #333; 
            margin-bottom: 20px; 
            font-size: 28px;
        }
        .status {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
        }
        .success { color: #28a745; font-weight: bold; }
        .error { color: #dc3545; font-weight: bold; }
        .btn { 
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            text-decoration: none;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
        .info { color: #666; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 清除浏览器缓存</h1>
        
        <div class="status" id="status">
            正在检查缓存状态...
        </div>

        <button class="btn" onclick="hardReload()">
            🔄 强制刷新并清除所有缓存
        </button>

        <p class="info">
            <strong>提示：</strong> 清除缓存后，请使用以下账号登录：<br><br>
            <span class="success">📧 Email: admin@appt.com</span><br>
            <span class="success">🔑 Password: admin123</span><br><br>
            登录后访问：<strong>/admin/dashboard</strong>
        </p>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        
        // Check if AdminLayout is loaded
        async function checkAdminLayout() {
            try {
                const response = await fetch('/assets/AdminLayout-CuUbvYfQ.js?v=' + Date.now());
                if (response.ok) {
                    statusEl.innerHTML = `
                        <span class="success">✅</span> 管理后台代码已加载<br>
                        AdminLayout 文件存在且可访问
                    `;
                } else {
                    throw new Error('File not found');
                }
            } catch (error) {
                statusEl.innerHTML = `
                    <span class="error">❌</span> 管理后台代码加载失败<br>
                    ${error.message}
                `;
            }
        }

        // Hard reload with cache clearing
        function hardReload() {
            // Clear localStorage
            localStorage.clear();
            
            // Force unload and reload
            window.location.href = '/?nocache=' + Date.now() + '&clearcache=1';
        }

        // Run check on load
        checkAdminLayout();
    </script>
</body>
</html>
