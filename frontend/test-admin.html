<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试管理后台 - 清除缓存</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .info { background: #e3f2fd; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .btn { display: inline-block; padding: 10px 20px; background: #4caf50; color: white; text-decoration: none; border-radius: 5px; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="info">
        <h3>🔧 清除缓存测试页</h3>
        <p><strong>时间戳:</strong> <span id="timestamp"></span></p>
        <p>点击以下按钮强制加载最新代码：</p>
    </div>
    
    <a href="/?nocache=20260416" class="btn">🔄 刷新首页 (无缓存)</a>
    <a href="/admin/dashboard?nocache=20260416" class="btn">🚪 访问管理后台 (强制刷新)</a>
    
    <h3>📊 当前状态检查:</h3>
    <ul id="status"></ul>
    
    <script>
        document.getElementById('timestamp').textContent = new Date().toLocaleString();
        
        // Check if AdminLayout is loaded
        const status = document.getElementById('status');
        
        fetch('/assets/index-C4IMlrNY.js?nocache=' + Date.now())
            .then(r => r.text())
            .then(code => {
                if (code.includes('AdminLayout')) {
                    const li = document.createElement('li');
                    li.style.color = 'green';
                    li.innerHTML = '✅ <strong>AdminLayout 已加载到 JS bundle</strong>';
                    status.appendChild(li);
                } else {
                    const li = document.createElement('li');
                    li.style.color = 'red';
                    li.textContent = '❌ AdminLayout 未找到';
                    status.appendChild(li);
                }
            });
        
        fetch('/assets/AdminLayout-CuUbvYfQ.js?nocache=' + Date.now())
            .then(r => {
                if (r.ok) {
                    const li = document.createElement('li');
                    li.style.color = 'green';
                    li.textContent = '✅ AdminLayout 独立文件可访问';
                    status.appendChild(li);
                } else {
                    const li = document.createElement('li');
                    li.style.color = 'red';
                    li.textContent = '❌ AdminLayout 文件不存在';
                    status.appendChild(li);
                }
            });
    </script>
</body>
</html>
