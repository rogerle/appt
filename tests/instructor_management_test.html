<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Management API Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 flex items-center gap-2">
            👨‍🏫 教练管理 API 测试页面
        </h1>

        <!-- Test Actions -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">API 测试操作</h2>
            
            <div class="grid grid-cols-2 gap-4 mb-4">
                <button onclick="listInstructors()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                    📋 获取教练列表
                </button>
                <button onclick="searchInstructor('张')" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
                    🔍 搜索 "张"
                </button>
            </div>

            <!-- Create Form -->
            <details class="mb-4">
                <summary class="cursor-pointer font-medium text-gray-700 mb-2">➕ 创建新教练</summary>
                <form id="createForm" onsubmit="createInstructor(event)" class="space-y-3 mt-3 p-4 bg-gray-50 rounded">
                    <input type="text" id="newName" placeholder="姓名（必填）" required 
                           class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-green-500 outline-none">
                    <textarea id="newBio" placeholder="简介（可选）" rows="2"
                              class="w-full px-3 py-2 border rounded"></textarea>
                    <input type="tel" id="newPhone" placeholder="手机号（可选，11 位）" 
                           pattern="^1[3-9]\d{9}$"
                           class="w-full px-3 py-2 border rounded">
                    <button type="submit" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
                        创建教练
                    </button>
                </form>
            </details>

            <!-- Delete Button -->
            <div id="deleteSection" class="hidden p-3 bg-red-50 rounded border border-red-200">
                <p class="text-sm text-red-700 mb-2">⚠️ 删除已选择的教练</p>
                <button onclick="deleteSelectedInstructor()" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">
                    🗑️ 确认删除
                </button>
            </div>
        </div>

        <!-- Results Display -->
        <div id="results" class="bg-white rounded-lg shadow p-6 hidden">
            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                📊 结果 
                <span id="resultCount" class="text-sm bg-gray-100 px-3 py-1 rounded-full"></span>
            </h2>
            
            <div id="resultsContent" class="space-y-4 max-h-[500px] overflow-auto"></div>
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="hidden text-center py-12">
            <div class="inline-block loading border-4 border-green-600 border-t-transparent rounded-full w-12 h-12 mb-3"></div>
            <p class="text-gray-500">加载中...</p>
        </div>

        <!-- Error Display -->
        <div id="error" class="hidden bg-red-50 border border-red-200 rounded-lg p-4 mt-4">
            <p class="text-red-700"></p>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api/v1/instructors';
        let selectedInstructorId = null;

        async function listInstructors(searchTerm = '', page = 1, limit = 20) {
            showLoading(true);
            hideError();
            
            try {
                const params = new URLSearchParams({
                    skip: String((page - 1) * limit),
                    limit: String(limit)
                });
                
                if (searchTerm) params.append('search', searchTerm);
                
                const response = await fetch(`${API_BASE}/?${params.toString()}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                displayResults(data, searchTerm || '全部教练');
                
            } catch (error) {
                showError(error.message);
            } finally {
                showLoading(false);
            }
        }

        function searchInstructor(term) {
            listInstructors(term);
        }

        async function createInstructor(event) {
            event.preventDefault();
            showLoading(true);
            
            try {
                const data = {
                    name: document.getElementById('newName').value,
                    bio: document.getElementById('newBio').value || null,
                    phone: document.getElementById('newPhone').value || null
                };

                const response = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || '创建失败');
                }

                const result = await response.json();
                alert(`✅ 教练 "${result.name}" 创建成功！ID: ${result.id}`);
                
                // Reset form and reload list
                document.getElementById('createForm').reset();
                listInstructors();
                
            } catch (error) {
                showError(error.message);
            } finally {
                showLoading(false);
            }
        }

        async function deleteSelectedInstructor() {
            if (!selectedInstructorId) return;
            
            if (!confirm('确定要删除这个教练吗？')) return;
            
            try {
                const response = await fetch(`${API_BASE}/${selectedInstructorId}`, {
                    method: 'DELETE'
                });

                if (response.status === 409) {
                    const errorData = await response.json();
                    alert(`⚠️ ${errorData.detail}`);
                    return;
                }

                if (!response.ok) {
                    throw new Error('删除失败');
                }

                alert('✅ 教练已停用（软删除）');
                listInstructors(); // Reload
                
            } catch (error) {
                showError(error.message);
            }
        }

        function displayResults(instructors, title) {
            const container = document.getElementById('resultsContent');
            const resultsDiv = document.getElementById('results');
            
            if (!instructors || instructors.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-8">没有找到符合条件的教练</p>';
            } else {
                container.innerHTML = instructors.map(inst => `
                    <div class="border rounded-lg p-4 hover:shadow-md transition cursor-pointer" 
                         onclick="selectInstructor(${inst.id}, this)">
                        <div class="flex items-center gap-4">
                            ${inst.photo_url ? 
                                `<img src="${inst.photo_url}" class="w-12 h-12 rounded-full object-cover">` :
                                `<div class="w-12 h-12 bg-gradient-to-br from-green-400 to-blue-500 rounded-full flex items-center justify-center text-white font-bold">${inst.name[0]}</div>`
                            }
                            <div class="flex-1">
                                <h3 class="font-semibold text-lg">${inst.name}</h3>
                                <p class="text-sm text-gray-600 truncate">${inst.bio || '暂无简介'}</p>
                                <div class="flex items-center gap-4 mt-2 text-xs">
                                    <span class="${inst.is_active ? 'text-green-600' : 'text-red-600'}">
                                        ${inst.is_active ? '✓ 活跃' : '✗ 已停用'}
                                    </span>
                                    <span class="text-blue-600">${inst.total_schedules} 个课程</span>
                                    <span class="text-gray-500">${inst.phone || '-'}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            document.getElementById('resultCount').textContent = `${instructors.length} 条结果`;
            resultsDiv.classList.remove('hidden');
        }

        function selectInstructor(id, element) {
            // Remove selection from all items
            document.querySelectorAll('#resultsContent > div').forEach(div => {
                div.classList.remove('ring-2', 'ring-red-500', 'bg-red-50');
            });
            
            selectedInstructorId = id;
            element.classList.add('ring-2', 'ring-red-500', 'bg-red-50');
            document.getElementById('deleteSection').classList.remove('hidden');
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('hidden', !show);
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.querySelector('p').textContent = `⚠️ ${message}`;
            errorDiv.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('error').classList.add('hidden');
        }

        // Initial load
        listInstructors();
    </script>
</body>
</html>
