version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: appt-db
    environment:
      POSTGRES_DB: appt
      POSTGRES_USER: appt_user
      POSTGRES_PASSWORD: change_me_in_production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appt_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appt-network

  # Python FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: appt-backend
    environment:
      DATABASE_URL: postgresql://appt_user:change_me_in_production@postgres:5432/appt
      FASTAPI_ENV: development
      SECRET_KEY: change_this_to_a_random_512bit_key
      ADMIN_PASSWORD: admin_password_change_me
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app  # For development hot-reload (optional)
    networks:
      - appt-network

  # Vue 3 Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: appt-frontend
    ports:
      - "8080:80"  # Host port 8080 -> Container port 80
    depends_on:
      backend:
        condition: service_started
    networks:
      - appt-network

volumes:
  postgres_data:
    driver: local

networks:
  appt-network:
    driver: bridge
