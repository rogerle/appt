version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: appt-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appt}
      POSTGRES_USER: ${POSTGRES_USER:-appt_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-appt_password_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appt_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Python FastAPI 后端
  backend:
    build: ./backend
    container_name: appt-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-appt_user}:${POSTGRES_PASSWORD:-appt_password_2026}@postgres:5432/${POSTGRES_DB:-appt}
      FASTAPI_ENV: ${FASTAPI_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # Vue 3 前端 (开发模式使用 npm dev，生产模式使用 nginx)
  frontend:
    build: 
      context: ./frontend
      target: development
    container_name: appt-frontend
    ports:
      - "80:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
